name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm -r run test

  release-please:
    needs: [check]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      pi-anthropic-auth: ${{ steps.release.outputs['packages/pi-anthropic-auth--release_created'] }}
      pi-autoformat: ${{ steps.release.outputs['packages/pi-autoformat--release_created'] }}
      pi-github-tools: ${{ steps.release.outputs['packages/pi-github-tools--release_created'] }}
      pi-permission-system: ${{ steps.release.outputs['packages/pi-permission-system--release_created'] }}
      pi-subagents: ${{ steps.release.outputs['packages/pi-subagents--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Publish pi-anthropic-auth
        if: needs.release-please.outputs.pi-anthropic-auth == 'true'
        run: pnpm --filter @gotgenes/pi-anthropic-auth publish --access public --no-git-checks --provenance

      - name: Publish pi-autoformat
        if: needs.release-please.outputs.pi-autoformat == 'true'
        run: pnpm --filter @gotgenes/pi-autoformat publish --access public --no-git-checks --provenance

      - name: Publish pi-github-tools
        if: needs.release-please.outputs.pi-github-tools == 'true'
        run: pnpm --filter @gotgenes/pi-github-tools publish --access public --no-git-checks --provenance

      - name: Publish pi-permission-system
        if: needs.release-please.outputs.pi-permission-system == 'true'
        run: pnpm --filter @gotgenes/pi-permission-system publish --access public --no-git-checks --provenance

      - name: Publish pi-subagents
        if: needs.release-please.outputs.pi-subagents == 'true'
        run: pnpm --filter @gotgenes/pi-subagents publish --access public --no-git-checks --provenance
