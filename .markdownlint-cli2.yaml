# CHANGELOG.md is machine-generated by release-please. Its double blank lines
# between sections are intentional; exclude it from linting entirely.
ignores:
  - "CHANGELOG.md"
  - "node_modules/**"

config:
  line-length: false
  no-duplicate-heading:
    siblings_only: true
  # MD060/table-column-style is noisy for hand-authored tables with varied
  # content widths. We care that tables render, not that every pipe lines up.
  table-column-style: false
